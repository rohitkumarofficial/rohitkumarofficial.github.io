@if (education().length > 0) {
  <mat-card appearance="outlined">
    <h2>
      <mat-icon>school</mat-icon>
      Education
    </h2>

    <div class="timeline">
      @for (edu of education(); track edu.institution) {
        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <div class="card-header">
              <div class="card-left">
                <h3 class="edu-title">{{ edu.degree }}</h3>
                <span class="company">{{ edu.institution }}</span>
              </div>
              <div class="card-right">
                <span class="meta">
                  <mat-icon>calendar_today</mat-icon>
                  {{ edu.year }}
                </span>
                <span class="meta">
                  <mat-icon>location_on</mat-icon>
                  {{ edu.location }}
                </span>
              </div>
            </div>

            @if (edu.field) {
              <p class="summary">{{ edu.field }}</p>
            }

            <div class="score">
              <span class="chip">{{ edu.score }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </mat-card>
}
