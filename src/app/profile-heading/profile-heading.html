@if (profile()) {
  <mat-card appearance="outlined">
    <div class="name">{{ profile().name }}</div>
    <div class="role">UI Lead | Senior Full Stack Engineer (Angular & .NET)</div>
    <div class="contact-info">
      <div class="email">
        <mat-icon>email</mat-icon>
        <span>{{ profile().email }}</span>
      </div>

      <div class="mobile">
        <mat-icon>phone</mat-icon>
        <span>{{ profile().phone }}</span>
      </div>

      <div class="address">
        <mat-icon>home</mat-icon>
        <span>{{ profile().location }}</span>
      </div>
    </div>
    <div class="link">
      <button matButton="tonal" (click)="link('linkedin')">
        <mat-icon>link</mat-icon>
        <span>Linkedin</span>
      </button>
      <button matButton="tonal" (click)="link('github')">
        <mat-icon>code</mat-icon>
        <span>Github</span>
      </button>
    </div>
  </mat-card>
}
